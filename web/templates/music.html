<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Hub - 聚合搜索与解析</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #667eea;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-sub: #718096;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --shadow-active: 0 10px 15px -3px rgba(102, 126, 234, 0.2);
            --error-color: #e53e3e;
            --btn-switch-bg: #fff7ed;
            --btn-switch-text: #9a3412;
            --btn-switch-border: #fed7aa;
            --btn-dl-bg: #ebf8ff;
            --btn-dl-text: #2b6cb0;
            --btn-dl-border: #bee3f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: #eef2f5;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: 100% 600px;
            background-repeat: no-repeat;
            color: var(--text-main);
            padding: 40px 20px 150px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            text-align: center;
            margin: 0 0 25px 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-type-switch {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .type-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-sub);
            transition: color 0.2s;
        }

        .type-option input {
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .type-option:hover {
            color: var(--primary-color);
        }

        .type-option input:checked + span {
            color: var(--primary-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 24px;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            background: #f8fafc;
            min-width: 0;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .search-btn {
            padding: 0 32px;
            border: none;
            border-radius: 50px;
            background: var(--primary-gradient);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            flex-shrink: 0;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fff5f5;
            color: var(--error-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #fed7d7;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .source-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #edf2f7;
        }

        .source-title {
            font-weight: 700;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: #edf2f7;
            color: var(--primary-color);
        }

        .source-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .source-checkbox {
            display: none;
        }

        .source-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .source-name {
            font-size: 14px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 3px;
        }

        .source-desc {
            font-size: 11px;
            color: #a0aec0;
            line-height: 1.2;
            font-weight: 400;
        }

        .source-checkbox:checked + .source-card {
            border-color: var(--primary-color);
            background: #eff3ff;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.15);
        }

        .source-checkbox:checked + .source-card .source-name {
            color: var(--primary-color);
        }

        .source-checkbox:checked + .source-card .source-desc {
            color: #7f9cf5;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #edf2f7;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .result-count {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-count .count {
            color: var(--primary-color);
        }

        .result-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .song-card {
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            position: relative;
            z-index: 5;
            border: 2px solid transparent;
        }

        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-active);
        }

        .song-card.selected {
            border-color: var(--primary-color);
            background: #f7fafc;
        }

        .cover-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 15px;
            background: #eee;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-info {
            flex: 1;
            min-width: 0;
            margin-right: 10px;
        }

        .song-info h3 {
            margin: 0 0 6px;
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-line {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .tags {
            display: flex;
            gap: 6px;
        }

        .tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            background: #edf2f7;
            color: #718096;
            font-weight: 600;
        }

        .tag-src {
            background: #ebf8ff;
            color: #3182ce;
            text-transform: uppercase;
        }

        .tag-loading {
            color: #d69e2e;
        }

        .tag-success {
            color: #38a169;
        }

        .tag-fail {
            color: #e53e3e;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            position: relative;
            z-index: 10;
            font-size: 14px;
        }

        .btn-play {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .btn-play:hover {
            transform: scale(1.1);
        }

        .btn-dl {
            background: #f7fafc;
            color: var(--text-sub);
            border: 1px solid #e2e8f0;
        }

        .btn-dl:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: var(--text-sub);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
        }

        .loading i {
            font-size: 24px;
            color: var(--primary-color);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .batch-toolbar {
            display: none;
            background: #fff;
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 2px solid var(--primary-color);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .batch-toolbar.active {
            display: flex;
        }

        .batch-info {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .batch-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-pill {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
        }

        .btn-pill-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-pill-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .btn-pill-dl {
            background: var(--btn-dl-bg);
            color: var(--btn-dl-text);
            border-color: var(--btn-dl-border);
        }

        .btn-pill-dl:hover:not(:disabled) {
            border-color: #3182ce;
            background: #ebf8ff;
        }

        .btn-pill:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        @media (max-width: 768px) {
            body {
                padding: 0 0 200px 0;
                background-size: 100% 400px;
            }

            .container {
                padding: 0;
                width: 100%;
            }

            .search-box {
                padding: 20px 15px;
                border-radius: 0 0 20px 20px;
                margin-bottom: 20px;
                border-left: none;
                border-right: none;
                border-top: none;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }

            .input-group {
                margin-bottom: 15px;
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
                height: 44px;
            }

            .source-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 8px;
            }

            .source-card {
                padding: 8px 4px;
                min-height: 40px;
                justify-content: center;
            }

            .source-name {
                font-size: 12px;
            }

            .source-desc {
                display: none;
            }

            .result-list {
                padding: 0 12px;
                gap: 12px;
            }

            .song-card {
                margin: 0;
                padding: 12px;
                border-radius: 12px;
                align-items: flex-start;
            }

            .cover-wrapper {
                width: 54px;
                height: 54px;
                margin-right: 12px;
                border-radius: 8px;
            }

            .song-info h3 {
                font-size: 15px;
                margin-bottom: 4px;
                max-width: 100%;
                white-space: normal;
            }

            .artist-line {
                font-size: 12px;
                margin-bottom: 6px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 180px;
            }

            .tags {
                flex-wrap: wrap;
            }

            .tag {
                padding: 2px 5px;
            }

            .actions {
                display: grid;
                grid-template-columns: repeat(2, 34px);
                grid-auto-rows: 34px;
                gap: 8px;
                flex-shrink: 0;
                justify-content: flex-end;
            }

            .btn-circle {
                width: 34px;
                height: 34px;
                font-size: 13px;
            }

            .batch-toolbar {
                padding: 12px;
                border-radius: 12px;
                flex-direction: column;
                align-items: stretch;
            }

            .batch-info {
                justify-content: center;
                flex-wrap: wrap;
            }

            .batch-actions {
                flex-direction: column;
                justify-content: flex-start;
            }

            .btn-pill {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <h1>🎵 Music Hub</h1>
            
            <div class="search-type-switch">
                <label class="type-option">
                    <input type="radio" name="type" value="song" checked> 
                    <span>单曲搜索</span>
                </label>
                <label class="type-option">
                    <input type="radio" name="type" value="playlist"> 
                    <span>歌单搜索</span>
                </label>
            </div>

            <div class="input-group">
                <input type="text" id="search-input" placeholder="搜索歌曲、歌手... 或直接粘贴分享链接" required autocomplete="off">
                <button type="button" class="search-btn" id="search-btn" onclick="doSearch()">
                    <i class="fas fa-magnifying-glass"></i> 搜索
                </button>
            </div>

            <div class="source-selector">
                <div class="source-header">
                    <span class="source-title">搜索源设置</span>
                    <div>
                        <button type="button" class="ctrl-btn" onclick="selectAll()">全选</button>
                        <button type="button" class="ctrl-btn" onclick="clearAll()">清空</button>
                    </div>
                </div>
                
                <div class="source-grid" id="source-grid">
                    <label>
                        <input type="checkbox" name="sources" value="netease" class="source-checkbox" checked> 
                        <div class="source-card">
                            <div class="source-name">netease</div>
                            <div class="source-desc">网易云音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="qq" class="source-checkbox" checked> 
                        <div class="source-card">
                            <div class="source-name">qq</div>
                            <div class="source-desc">QQ音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="kugou" class="source-checkbox" checked> 
                        <div class="source-card">
                            <div class="source-name">kugou</div>
                            <div class="source-desc">酷狗音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="kuwo" class="source-checkbox" checked> 
                        <div class="source-card">
                            <div class="source-name">kuwo</div>
                            <div class="source-desc">酷我音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="migu" class="source-checkbox" checked> 
                        <div class="source-card">
                            <div class="source-name">migu</div>
                            <div class="source-desc">咪咕音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="bilibili" class="source-checkbox"> 
                        <div class="source-card">
                            <div class="source-name">bilibili</div>
                            <div class="source-desc">B站音乐</div>
                        </div>
                    </label>
                    
                    <label>
                        <input type="checkbox" name="sources" value="jamendo" class="source-checkbox"> 
                        <div class="source-card">
                            <div class="source-name">jamendo</div>
                            <div class="source-desc">Jamendo</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div id="batch-toolbar" class="batch-toolbar">
            <div class="batch-info">
                <span>已选择 <span id="selected-count">0</span> 首</span>
            </div>
            <div class="batch-actions">
                <button class="btn-pill btn-pill-dl" onclick="batchDownload()">
                    <i class="fas fa-download"></i> 批量下载
                </button>
                <button class="btn-pill btn-pill-primary" onclick="clearSelection()">
                    <i class="fas fa-times"></i> 取消选择
                </button>
            </div>
        </div>

        <div id="results-container">
            <div class="no-results">
                <i class="fas fa-music" style="font-size: 48px; margin-bottom: 15px; opacity: 0.3;"></i>
                <p>输入关键词开始搜索</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api/music';
        let currentResults = [];
        let selectedSongs = new Set();

        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });

        function getSelectedPlatforms() {
            const checkboxes = document.querySelectorAll('input[name="sources"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function selectAll() {
            document.querySelectorAll('.source-checkbox').forEach(cb => cb.checked = true);
        }

        function clearAll() {
            document.querySelectorAll('.source-checkbox').forEach(cb => cb.checked = false);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'flex';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showLoading() {
            document.getElementById('results-container').innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>搜索中...</p>
                </div>
            `;
        }

        function formatDuration(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function renderResults(results) {
            currentResults = results;
            const container = document.getElementById('results-container');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 15px; opacity: 0.3;"></i>
                        <p>未找到相关歌曲</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="list-header">
                    <div class="result-count">
                        找到 <span class="count">${results.length}</span> 首歌曲
                    </div>
                </div>
                <ul class="result-list">
            `;

            results.forEach((song, index) => {
                const isSelected = selectedSongs.has(index);
                html += `
                    <li class="song-card ${isSelected ? 'selected' : ''}" data-index="${index}">
                        <div class="cover-wrapper">
                            <img src="${song.picUrl || 'https://via.placeholder.com/64'}" alt="封面" onerror="this.src='https://via.placeholder.com/64'">
                        </div>
                        <div class="song-info">
                            <h3>${song.title}</h3>
                            <div class="artist-line">${song.artist}</div>
                            <div class="tags">
                                <span class="tag tag-src">${song.platform}</span>
                                <span class="tag">${formatDuration(song.duration)}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-circle btn-play" onclick="playSong(${index})" title="播放">
                                <i class="fas fa-play"></i>
                            </button>
                            <button class="btn-circle btn-dl" onclick="downloadSong(${index})" title="下载">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </li>
                `;
            });

            html += '</ul>';
            container.innerHTML = html;
        }

        async function doSearch() {
            const keyword = document.getElementById('search-input').value.trim();
            if (!keyword) {
                showError('请输入搜索关键词');
                return;
            }

            const platforms = getSelectedPlatforms();
            if (platforms.length === 0) {
                showError('请至少选择一个搜索平台');
                return;
            }

            document.getElementById('search-btn').disabled = true;
            showLoading();

            try {
                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        keyword: keyword,
                        platforms: platforms
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    renderResults(data.results);
                } else {
                    showError(data.error || '搜索失败');
                }
            } catch (error) {
                console.error('Search error:', error);
                showError('网络错误，请确保后端服务正在运行');
                document.getElementById('results-container').innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 15px; color: #e53e3e;"></i>
                        <p>无法连接到服务器</p>
                        <p style="font-size: 12px; margin-top: 10px;">请确保后端服务已启动 (python backend.py)</p>
                    </div>
                `;
            } finally {
                document.getElementById('search-btn').disabled = false;
            }
        }

        function playSong(index) {
            const song = currentResults[index];
            alert(`播放: ${song.title} - ${song.artist}`);
        }

        async function downloadSong(index) {
            const song = currentResults[index];
            const btn = event.target.closest('.btn-dl');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const response = await fetch(`${API_BASE}/download`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        song: song,
                        save_dir: '~/Music'
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('下载成功！');
                } else {
                    alert('下载失败: ' + data.message);
                }
            } catch (error) {
                alert('下载出错: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-download"></i>';
            }
        }

        function batchDownload() {
            const selected = Array.from(selectedSongs).map(i => currentResults[i]);
            if (selected.length === 0) {
                showError('请先选择要下载的歌曲');
                return;
            }
            alert(`将下载 ${selected.length} 首歌曲`);
        }

        function clearSelection() {
            selectedSongs.clear();
            document.querySelectorAll('.song-card.selected').forEach(card => {
                card.classList.remove('selected');
            });
            updateBatchToolbar();
        }

        function updateBatchToolbar() {
            const count = selectedSongs.size;
            document.getElementById('selected-count').textContent = count;
            const toolbar = document.getElementById('batch-toolbar');
            if (count > 0) {
                toolbar.classList.add('active');
            } else {
                toolbar.classList.remove('active');
            }
        }

        document.getElementById('results-container').addEventListener('click', function(e) {
            const card = e.target.closest('.song-card');
            if (card && !e.target.closest('.actions')) {
                const index = parseInt(card.dataset.index);
                if (selectedSongs.has(index)) {
                    selectedSongs.delete(index);
                    card.classList.remove('selected');
                } else {
                    selectedSongs.add(index);
                    card.classList.add('selected');
                }
                updateBatchToolbar();
            }
        });
    </script>
</body>
</html>
