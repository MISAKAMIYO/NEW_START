<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布帖子 - RAILGUN 论坛</title>
    <link rel="stylesheet" href="css/forum.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .new-post-form {
            max-width: 800px;
            margin: 0 auto;
        }

        .category-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .category-select {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .category-option {
            padding: 16px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .category-option:hover {
            border-color: var(--primary);
        }

        .category-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .category-option .icon {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .category-option .name {
            font-weight: 500;
            font-size: 14px;
        }

        .tips-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }

        .tips-card h4 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--primary-light);
        }

        .tips-card ul {
            list-style: none;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tips-card li {
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }

        .tips-card li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .char-count {
            text-align: right;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .char-count.warning {
            color: var(--warning);
        }

        .char-count.error {
            color: var(--error);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">💬</span>
                <span class="logo-text">社区论坛</span>
            </a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="new.html" class="active">发布帖子</a>
            </div>
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索帖子..." onkeypress="handleSearch(event)">
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                返回论坛首页
            </a>

            <div class="new-post-form">
                <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">📝 发布新帖子</h1>
                <p style="color: var(--text-secondary); margin-bottom: 32px;">分享您的想法、建议或问题</p>

                <form id="newPostForm" onsubmit="submitNewPost(event)">
                    <div class="tips-card">
                        <h4>💡 发布须知</h4>
                        <ul>
                            <li>请选择合适的版块分类，便于其他用户找到您的帖子</li>
                            <li>标题要简洁明了，描述帖子核心内容</li>
                            <li>内容尽量详细，必要时可附上截图或错误日志</li>
                            <li>请勿发布违法、广告或重复内容</li>
                        </ul>
                    </div>

                    <div class="form-group">
                        <label>选择版块</label>
                        <div class="category-select" id="categorySelect">
                            <div class="category-option" data-category="general" onclick="selectCategory(this)">
                                <span class="icon">💬</span>
                                <span class="name">综合讨论</span>
                            </div>
                            <div class="category-option" data-category="suggestion" onclick="selectCategory(this)">
                                <span class="icon">💡</span>
                                <span class="name">建议反馈</span>
                            </div>
                            <div class="category-option" data-category="bug" onclick="selectCategory(this)">
                                <span class="icon">🐛</span>
                                <span class="name">Bug反馈</span>
                            </div>
                            <div class="category-option" data-category="discussion" onclick="selectCategory(this)">
                                <span class="icon">💻</span>
                                <span class="name">技术讨论</span>
                            </div>
                            <div class="category-option" data-category="chat" onclick="selectCategory(this)">
                                <span class="icon">☕</span>
                                <span class="name">闲聊灌水</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="postTitle">帖子标题</label>
                            <input type="text" id="postTitle" class="form-input" placeholder="请输入帖子标题（2-100字符）" required maxlength="100" oninput="updateCharCount('postTitle', 'titleCount')">
                            <div class="char-count" id="titleCount">0 / 100</div>
                        </div>
                        <div class="form-group">
                            <label for="postAuthor">您的昵称</label>
                            <input type="text" id="postAuthor" class="form-input" placeholder="请输入昵称" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="postContent">帖子内容</label>
                        <textarea id="postContent" class="form-textarea" placeholder="请详细描述您想要分享的内容..." required minlength="10" maxlength="5000" oninput="updateCharCount('postContent', 'contentCount'); adjustTextareaHeight(this)"></textarea>
                        <div class="char-count" id="contentCount">0 / 5000</div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-outline" onclick="saveDraft()">💾 保存草稿</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                            发布帖子
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">© 2025 RAILGUN Forum. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">关于我们</a>
                    <a href="#">使用条款</a>
                    <a href="#">隐私政策</a>
                </div>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/forum.js"></script>
    <script>
        let selectedCategory = '';

        function selectCategory(element) {
            document.querySelectorAll('.category-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedCategory = element.dataset.category;
        }

        function updateCharCount(inputId, countId) {
            const input = document.getElementById(inputId);
            const countEl = document.getElementById(countId);
            const len = input.value.length;
            const max = parseInt(input.maxLength);
            countEl.textContent = `${len} / ${max}`;
            countEl.className = 'char-count';
            if (len >= max * 0.9) {
                countEl.classList.add('warning');
            }
            if (len >= max) {
                countEl.classList.add('error');
            }
        }

        function adjustTextareaHeight(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function saveDraft() {
            const draft = {
                category: selectedCategory,
                title: document.getElementById('postTitle').value,
                author: document.getElementById('postAuthor').value,
                content: document.getElementById('postContent').value,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem('forum_draft', JSON.stringify(draft));
            showToast('草稿已保存');
        }

        function loadDraft() {
            const draft = localStorage.getItem('forum_draft');
            if (draft) {
                try {
                    const data = JSON.parse(draft);
                    document.getElementById('postTitle').value = data.title || '';
                    document.getElementById('postAuthor').value = data.author || '';
                    document.getElementById('postContent').value = data.content || '';
                    updateCharCount('postTitle', 'titleCount');
                    updateCharCount('postContent', 'contentCount');
                    if (data.category) {
                        const option = document.querySelector(`.category-option[data-category="${data.category}"]`);
                        if (option) selectCategory(option);
                    }
                    showToast('已加载上次草稿');
                } catch (e) {
                    console.error('Failed to load draft:', e);
                }
            }
        }

        async function submitNewPost(event) {
            event.preventDefault();

            if (!selectedCategory) {
                showToast('请选择版块分类', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> 发布中...';

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: document.getElementById('postTitle').value,
                        content: document.getElementById('postContent').value,
                        category: selectedCategory,
                        author: document.getElementById('postAuthor').value
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast('帖子发布成功！', 'success');
                    localStorage.removeItem('forum_draft');
                    setTimeout(() => {
                        window.location.href = `post.html?id=${result.data.post_id}`;
                    }, 1500);
                } else {
                    showToast(result.error || '发布失败', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 发布帖子`;
                }
            } catch (error) {
                showToast('网络错误，请重试', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> 发布帖子`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDraft();
        });
    </script>
</body>
</html>
