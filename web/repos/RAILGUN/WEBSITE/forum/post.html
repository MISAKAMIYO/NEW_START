<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - RAILGUN 论坛</title>
    <link rel="stylesheet" href="css/forum.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">💬</span>
                <span class="logo-text">社区论坛</span>
            </a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="new.html">发布帖子</a>
                <a href="login.html" id="loginLink">登录</a>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span id="usernameDisplay"></span>
                </div>
            </div>
            <div class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索帖子..." onkeypress="handleSearch(event)">
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                返回论坛首页
            </a>

            <div id="postDetail">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="replies-section" id="repliesSection" style="display: none;">
                <div class="replies-header">
                    <h2 class="replies-title">💬 回复列表 (<span id="replyCount">0</span>)</h2>
                    <div class="reply-sort">
                        <button class="sort-btn active" data-sort="time" onclick="PostDetail.changeSort('time')">最新</button>
                        <button class="sort-btn" data-sort="hot" onclick="PostDetail.changeSort('hot')">最热</button>
                    </div>
                </div>

                <div id="repliesList"></div>

                <div class="pagination" id="repliesPagination" style="display: none;">
                    <button class="page-btn" id="repliesPrevBtn" onclick="PostDetail.changeReplyPage(-1)">上一页</button>
                    <span class="page-info" id="repliesPageInfo">第 1 / 1 页</span>
                    <button class="page-btn" id="repliesNextBtn" onclick="PostDetail.changeReplyPage(1)">下一页</button>
                </div>

                <div class="reply-form" id="replyForm">
                    <h3 style="margin-bottom: 16px;">📝 发表评论</h3>
                    <form id="mainReplyForm" onsubmit="PostDetail.submitReply(event)">
                        <div id="replyToInfo" style="display: none; margin-bottom: 12px; padding: 10px 14px; background: rgba(99, 102, 241, 0.1); border-radius: 8px; font-size: 14px; color: var(--text-secondary);">
                            <span>回复给: <strong id="replyToAuthor"></strong></span>
                            <button type="button" onclick="PostDetail.cancelReply()" style="float: right; background: none; border: none; color: var(--text-muted); cursor: pointer;">✕</button>
                        </div>
                        <div class="form-group" id="authorGroup">
                            <label for="replyAuthor">昵称</label>
                            <input type="text" id="replyAuthor" class="form-input" placeholder="请输入您的昵称">
                        </div>
                        <div class="form-group">
                            <label for="replyContent">回复内容 <span style="font-weight: normal; color: var(--text-muted);">(支持Markdown)</span></label>
                            <div class="markdown-editor">
                                <div class="editor-toolbar" id="replyToolbar">
                                    <button type="button" data-action="bold" title="粗体"><b>B</b></button>
                                    <button type="button" data-action="italic" title="斜体"><i>I</i></button>
                                    <button type="button" data-action="heading" title="标题">H</button>
                                    <button type="button" data-action="code" title="代码">&lt;/&gt;</button>
                                    <button type="button" data-action="quote" title="引用">❝</button>
                                    <button type="button" data-action="link" title="链接">🔗</button>
                                </div>
                                <textarea id="replyContent" class="editor-textarea" placeholder="支持Markdown语法：\n**粗体** *斜体* \n### 标题\n> 引用\n`代码`"></textarea>
                                <div class="editor-preview">
                                    <div class="preview-label">预览</div>
                                    <div id="replyPreview" class="preview-content"></div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                            发布回复
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">© 2025 RAILGUN Forum. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">关于我们</a>
                    <a href="#">使用条款</a>
                    <a href="#">隐私政策</a>
                </div>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/forum.js"></script>
    <script>
        const POST_ID = new URLSearchParams(window.location.search).get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (!POST_ID) {
                showToast('帖子ID不存在', 'error');
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }
            PostDetail.init();
        });
    </script>
</body>
</html>
