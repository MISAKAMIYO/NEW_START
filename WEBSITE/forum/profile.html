<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - RAILGUN 论坛</title>
    <link rel="stylesheet" href="css/forum.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        .profile-header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-avatar-section {
            flex-shrink: 0;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s ease;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-upload-btn {
            display: block;
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .avatar-upload-btn:hover {
            background: var(--primary);
            color: white;
        }

        #avatarInput {
            display: none;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .profile-bio {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 16px;
            max-width: 500px;
        }

        .profile-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .profile-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .profile-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .profile-content {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .profile-meta {
                justify-content: center;
            }

            .profile-actions {
                justify-content: center;
            }
        }

        .content-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .activity-item {
            padding: 16px;
            border-radius: 12px;
            background: var(--bg-secondary);
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            transform: translateX(4px);
        }

        .activity-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .activity-meta {
            display: flex;
            gap: 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .activity-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 6px;
            font-size: 12px;
        }

        .notification-item {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            background: var(--bg-secondary);
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .notification-item:hover {
            background: var(--bg-hover);
        }

        .notification-item.unread {
            border-left: 3px solid var(--primary);
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-message {
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .notification-time {
            color: var(--text-muted);
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .edit-profile-form {
            display: none;
        }

        .edit-profile-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg-primary);
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            min-width: 280px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid var(--primary); }

        .toast-icon {
            font-size: 20px;
        }

        .toast-message {
            color: var(--text-primary);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="profile-container">
        <div class="profile-header" id="profileHeader">
            <div class="profile-avatar-section">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <label class="avatar-upload-btn">
                    上传头像
                    <input type="file" id="avatarInput" accept="image/*">
                </label>
            </div>
            <div class="profile-info">
                <h1 class="profile-username" id="profileUsername">加载中...</h1>
                <p class="profile-bio" id="profileBio">暂无个人简介</p>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="statPosts">0</div>
                        <div class="stat-label">帖子</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statLikes">0</div>
                        <div class="stat-label">获赞</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statCreated">-</div>
                        <div class="stat-label">加入时间</div>
                    </div>
                </div>
                <div class="profile-meta">
                    <span class="meta-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span id="joinDate">加载中...</span>
                    </span>
                </div>
                <div class="profile-actions" id="profileActions">
                    <button class="btn btn-primary" id="editProfileBtn">编辑资料</button>
                    <button class="btn btn-secondary" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </div>

        <div class="edit-profile-form" id="editProfileForm">
            <div class="content-section">
                <h2 class="section-title">编辑个人资料</h2>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="editUsername" disabled>
                    <small style="color: var(--text-muted);">用户名无法修改</small>
                </div>
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <textarea class="form-textarea" id="editBio" placeholder="介绍一下自己吧..." maxlength="200"></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="saveProfileBtn">保存修改</button>
                    <button class="btn btn-secondary" id="cancelEditBtn">取消</button>
                </div>
            </div>
        </div>

        <div class="profile-content" id="profileContent">
            <div class="content-section">
                <h2 class="section-title">📝 我的帖子</h2>
                <div id="myPostsList">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>还没有发布过帖子</p>
                    </div>
                </div>
            </div>

            <div class="content-section">
                <h2 class="section-title">🔔 通知消息</h2>
                <div id="notificationsList">
                    <div class="empty-state">
                        <div class="empty-icon">🔔</div>
                        <p>暂无通知</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
